<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1120;
    color:white;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

/* Header */

.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    color:#d48cff;
    font-size:52px;
    margin-bottom:10px;
}

.header p{
    color:#94a3b8;
    font-size:18px;
}

/* Cards */

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.section-title{
    color:#c084fc;
    font-size:28px;
    margin-bottom:25px;
}

/* Form */

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    color:#e5e7eb;
}

input{
    padding:16px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:12px;
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#64748b;
}

input:focus{
    outline:none;
    border-color:#c084fc;
    box-shadow:0 0 12px rgba(192,132,252,.3);
}

.submit-btn{
    grid-column:span 2;
    border:none;
    padding:18px;
    border-radius:12px;
    background:linear-gradient(
        90deg,
        #9333ea,
        #7c3aed,
        #6d28d9
    );
    color:white;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.95;
}

/* Table */

.table-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search-box{
    width:300px;
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:linear-gradient(
        90deg,
        #9333ea,
        #7c3aed
    );
    color:white;
    padding:18px;
}

td{
    background:#111827;
    padding:18px;
    text-align:center;
    border-bottom:1px solid #1f2937;
}

tr:hover td{
    background:#172033;
}

.footer{
    text-align:center;
    color:#94a3b8;
    margin-top:20px;
}

/* Mobile */

@media(max-width:768px){

    form{
        grid-template-columns:1fr;
    }

    .submit-btn{
        grid-column:span 1;
    }

    .table-header{
        flex-direction:column;
        gap:15px;
    }

    .search-box{
        width:100%;
    }

    .header h1{
        font-size:36px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="header">
        <h1>🎓 Student Management System</h1>
        <p>Manage and organize student records efficiently</p>
    </div>

    <!-- Form Card -->

    <div class="card">

        <h2 class="section-title">
            ➕ Add New Student
        </h2>

        <form id="studentForm">

            <div class="form-group">
                <label>Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter student name"
                    required>
            </div>

            <div class="form-group">
                <label>Enrollment Number</label>
                <input
                    type="text"
                    id="enrollment"
                    placeholder="Enter enrollment number"
                    required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter email address"
                    required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input
                    type="text"
                    id="mobile"
                    placeholder="Enter mobile number"
                    required>
            </div>

            <div class="form-group">
                <label>Branch</label>
                <input
                    type="text"
                    id="branch"
                    placeholder="Enter branch"
                    required>
            </div>

            <button
                class="submit-btn"
                type="submit">
                + Add Student
            </button>

        </form>

    </div>

    <!-- Student List -->

    <div class="card">

        <div class="table-header">

            <h2 class="section-title">
                👥 Student List
            </h2>

            <input
                type="text"
                class="search-box"
                placeholder="Search students...">

        </div>

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Enrollment</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>Branch</th>
                </tr>
            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </div>

    <div class="footer">
        Built with Node.js & MySQL
    </div>

</div>

<script>

const API_URL = "http://localhost:3000/students";

document.getElementById("studentForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const student = {
        name: document.getElementById("name").value,
        enrollment: document.getElementById("enrollment").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        branch: document.getElementById("branch").value
    };

    try{

        const response = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(student)
        });

        const data = await response.json();

        alert(data.message);

        document.getElementById("studentForm").reset();

        loadStudents();

    }catch(error){
        console.log(error);
        alert("Error adding student");
    }
});

async function loadStudents(){

    try{

        const response = await fetch(API_URL);

        const students = await response.json();

        const table = document.getElementById("studentTable");

        table.innerHTML = "";

        students.forEach(student => {

            table.innerHTML += `
            <tr>
                <td>${student.name}</td>
                <td>${student.enrollment}</td>
                <td>${student.email}</td>
                <td>${student.mobile}</td>
                <td>${student.branch}</td>
            </tr>
            `;
        });

    }catch(error){
        console.log(error);
    }
}

loadStudents();

</script>

</body>
</html>
